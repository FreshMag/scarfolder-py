name: Docs

on:
  # Only deploy after CI passes on main — same enforcement pattern as release.yml.
  # If CI fails or is cancelled this workflow never runs.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Docusaurus
    runs-on: ubuntu-latest

    # Guard: skip if CI did not succeed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write   # push to gh-pages branch

    steps:
      # -----------------------------------------------------------------------
      # workflow_run lands on a detached HEAD — check out the tested branch so
      # git history commands work correctly.
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
          fetch-depth: 0   # needed for git-based last-updated dates in Docusaurus

      # -----------------------------------------------------------------------
      # Skip the deploy if no docs/ files were touched in this push.
      # This avoids a redundant re-deploy when only Python code changed.
      # -----------------------------------------------------------------------
      - name: Check whether docs changed
        id: docs_changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- docs/ .github/workflows/docs.yml 2>/dev/null || echo "changed")
          if [ -n "$CHANGED" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No docs changes detected — skipping deploy."
          fi

      - name: Set up Node.js
        if: steps.docs_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache: npm requires a committed package-lock.json.
          # Re-enable once `cd docs && npm install` has been committed.

      - name: Install dependencies
        if: steps.docs_changed.outputs.changed == 'true'
        working-directory: docs
        run: npm install

      - name: Build
        if: steps.docs_changed.outputs.changed == 'true'
        working-directory: docs
        run: npm run build
        env:
          DOCUSAURUS_DISABLE_TELEMETRY: "true"

      - name: Deploy to gh-pages branch
        if: steps.docs_changed.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy from ${{ github.event.workflow_run.head_sha || github.sha }}"
