name: Release

on:
  # Trigger only when the CI workflow completes successfully on main.
  # This is the enforcement point: if CI fails, this workflow never runs.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Semantic Release + Docker
    runs-on: ubuntu-latest

    # Guard: skip if CI did not succeed (e.g. was cancelled).
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write      # push version bump commit + tag
      packages: write      # push image to ghcr.io
      id-token: write      # required by some OIDC-based actions

    steps:
      # -----------------------------------------------------------------------
      # IMPORTANT: workflow_run checkouts land on a detached HEAD pointing at
      # the triggering SHA. python-semantic-release inspects the active branch
      # name to enforce the `branch = "main"` config, so we must explicitly
      # check out the ref that was tested, not just its SHA.
      # -----------------------------------------------------------------------
      - name: Checkout main (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity for PSR commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      # -----------------------------------------------------------------------
      # Determine whether there is anything to release.
      # PSR v9: `--print` prints the next version and exits 0 when a release
      # is warranted; exits non-zero (code 2) when nothing has changed.
      # We capture the exit code explicitly instead of suppressing it with
      # `|| true`, so real errors (exit 1) still fail the job.
      # -----------------------------------------------------------------------
      - name: Compute next version
        id: semver
        run: |
          set +e
          VERSION=$(semantic-release version --print)
          EXIT_CODE=$?
          set -e

          if [[ $EXIT_CODE -eq 0 && -n "$VERSION" ]]; then
            echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
            echo "has_release=true"       >> "$GITHUB_OUTPUT"
            echo "Next release: $VERSION"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "has_release=false"      >> "$GITHUB_OUTPUT"
            echo "No releasable commits since last tag — skipping."
          else
            echo "semantic-release exited with unexpected code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Bump version in pyproject.toml + scarfolder/__init__.py,
      # commit, tag, and push.
      # -----------------------------------------------------------------------
      - name: Apply version bump
        if: steps.semver.outputs.has_release == 'true'
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Docker — build and push to GitHub Container Registry.
      # Image: ghcr.io/<owner>/scarfolder:<version>
      #        ghcr.io/<owner>/scarfolder:latest
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: steps.semver.outputs.has_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.semver.outputs.has_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.semver.outputs.has_release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/scarfolder:buildcache
          cache-to:   type=registry,ref=ghcr.io/${{ github.repository_owner }}/scarfolder:buildcache,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/scarfolder:${{ steps.semver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/scarfolder:latest
          labels: |
            org.opencontainers.image.title=scarfolder
            org.opencontainers.image.description=Data and file scaffolding via configurable YAML pipelines
            org.opencontainers.image.version=${{ steps.semver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

      # -----------------------------------------------------------------------
      # Create GitHub Release with changelog body.
      # -----------------------------------------------------------------------
      - name: Publish GitHub Release
        if: steps.semver.outputs.has_release == 'true'
        run: semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
